global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'supplysense-local'
    env: 'development'

rule_files:
  - 'alert_rules.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'api-gateway'

  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['auth-service:8081']

  - job_name: 'supply-chain-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['supply-chain-service:8082']

  - job_name: 'risk-engine-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['risk-engine-service:8083']

  - job_name: 'event-processor-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['event-processor-service:8084']

  - job_name: 'notification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['notification-service:8085']

  - job_name: 'ai-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ai-service:8090']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['kafka:9092']
