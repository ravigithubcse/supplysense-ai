server:
  port: 8084
spring:
  application:
    name: event-processor-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/supplysense}
    username: ${DATABASE_USERNAME:supplysense}
    password: ${DATABASE_PASSWORD:supplysense_dev_password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: events
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: events
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: event-processor
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/supplysense
