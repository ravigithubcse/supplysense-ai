server:
  port: 8085
spring:
  application:
    name: notification-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/supplysense}
    username: ${DATABASE_USERNAME:supplysense}
    password: ${DATABASE_PASSWORD:supplysense_dev_password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: notifications
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: notifications
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:redis_dev_password}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/supplysense
  data:
    redis:
      host: redis
