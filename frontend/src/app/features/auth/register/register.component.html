<div class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 shadow-lg shadow-blue-600/30">
        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Create your account</h1>
      <p class="text-slate-400 text-sm mt-1">Get started with SupplySense AI</p>
    </div>

    <div class="bg-slate-800/60 backdrop-blur border border-slate-700/50 rounded-2xl p-8 shadow-2xl">
      <div *ngIf="error" class="mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-lg">
        <p class="text-red-300 text-sm">{{ error }}</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5">First name</label>
            <input formControlName="firstName" type="text"
              class="w-full px-3.5 py-2.5 bg-slate-900/70 border border-slate-600 rounded-lg text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
              placeholder="Ravi"/>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5">Last name</label>
            <input formControlName="lastName" type="text"
              class="w-full px-3.5 py-2.5 bg-slate-900/70 border border-slate-600 rounded-lg text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
              placeholder="Kumar"/>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Organization</label>
          <input formControlName="organizationName" type="text"
            class="w-full px-3.5 py-2.5 bg-slate-900/70 border border-slate-600 rounded-lg text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
            placeholder="Acme Corp"/>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Email address</label>
          <input formControlName="email" type="email"
            class="w-full px-3.5 py-2.5 bg-slate-900/70 border border-slate-600 rounded-lg text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
            placeholder="you@company.com"/>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
          <input formControlName="password" type="password"
            class="w-full px-3.5 py-2.5 bg-slate-900/70 border border-slate-600 rounded-lg text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
            placeholder="Min. 8 characters"/>
        </div>

        <button type="submit" [disabled]="isLoading"
          class="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 text-white font-medium rounded-lg text-sm transition-colors">
          {{ isLoading ? 'Creating account…' : 'Create account' }}
        </button>
      </form>

      <p class="text-center text-sm text-slate-400 mt-5">
        Already have an account?
        <a routerLink="/auth/login" class="text-blue-400 hover:text-blue-300 font-medium transition">Sign in</a>
      </p>
    </div>
  </div>
</div>
