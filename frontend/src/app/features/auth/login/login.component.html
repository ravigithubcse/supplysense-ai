<!-- login.component.html -->
<div class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 shadow-lg shadow-blue-600/30">
        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-tight">SupplySense AI</h1>
      <p class="text-slate-400 text-sm mt-1">Predictive Supply Chain Intelligence</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-800/60 backdrop-blur border border-slate-700/50 rounded-2xl p-8 shadow-2xl">
      <h2 class="text-lg font-semibold text-white mb-6">Sign in to your account</h2>

      <!-- Error -->
      <div *ngIf="error$ | async as error"
           class="mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-lg flex items-start gap-2">
        <svg class="w-4 h-4 text-red-400 mt-0.5 shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
        </svg>
        <span class="text-red-300 text-sm">{{ error }}</span>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Email address</label>
          <input formControlName="email" type="email" autocomplete="email"
            class="w-full px-3.5 py-2.5 bg-slate-900/70 border border-slate-600 rounded-lg text-white placeholder-slate-500 text-sm
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            placeholder="you@company.com"/>
          <p *ngIf="email.invalid && email.touched" class="mt-1 text-xs text-red-400">
            Please enter a valid email address.
          </p>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
          <div class="relative">
            <input formControlName="password" [type]="showPassword ? 'text' : 'password'" autocomplete="current-password"
              class="w-full px-3.5 py-2.5 bg-slate-900/70 border border-slate-600 rounded-lg text-white placeholder-slate-500 text-sm pr-10
                     focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
              placeholder="••••••••"/>
            <button type="button" (click)="showPassword = !showPassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200 transition">
              <svg *ngIf="!showPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg *ngIf="showPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
          <p *ngIf="password.invalid && password.touched" class="mt-1 text-xs text-red-400">
            Password must be at least 8 characters.
          </p>
        </div>

        <!-- Submit -->
        <button type="submit" [disabled]="isLoading$ | async"
          class="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed
                 text-white font-medium rounded-lg text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-slate-800">
          <span *ngIf="!(isLoading$ | async)">Sign in</span>
          <span *ngIf="isLoading$ | async" class="flex items-center justify-center gap-2">
            <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
            </svg>
            Signing in…
          </span>
        </button>
      </form>

      <p class="text-center text-sm text-slate-400 mt-5">
        Don't have an account?
        <a routerLink="/auth/register" class="text-blue-400 hover:text-blue-300 font-medium transition">Create one</a>
      </p>

      <!-- Demo credentials -->
      <div class="mt-5 p-3 bg-slate-900/50 rounded-lg border border-slate-700/50">
        <p class="text-xs text-slate-500 font-medium mb-1">Demo credentials</p>
        <p class="text-xs text-slate-400">admin@ss.ai / Admin1234!</p>
      </div>
    </div>
  </div>
</div>
